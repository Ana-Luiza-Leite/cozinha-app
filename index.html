<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha Inteligente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }

    .navbar-brand {
      font-size: 1.5rem;
      font-weight: bold;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="./assets/js/app.js"></script>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4CAF50">
</head>

<body>

<nav class="navbar navbar-dark bg-success sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand" onclick="navigate('/')" style="cursor: pointer;">Cozinha Inteligente</span>
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/estoque')">Estoque</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/entradas')">Entradas</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/saidas')">Saídas</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/fichas-tecnicas')">Fichas técnicas</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/cadastros')">Cadastros</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/relatorios')">Relatórios</button>
      <button class="btn btn-outline-light btn-sm" onclick="navigate('/cardapio')">Cardápio</button>
    </div>
  </div>
</nav>

<div class="container mt-4" id="app"></div>

<script>
  if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('ServiceWorker registrado:', reg))
        .catch(err => console.error('Falha ao registrar ServiceWorker:', err));
    });
  }
</script>

</body>
</html>
